<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.E.N.E.W Admin Portal</title>
    <meta name="description" content="R.E.N.E.W Admin Portal — Manage members, trainers, finance, inventory and more for your gym.">
    
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandRed: '#FF0033',
                        darkBg: '#121212',
                        darkSurface: '#1E1E1E',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-darkBg text-white h-screen flex overflow-hidden font-sans" id="body">

    <!-- Hamburger Menu Button (Mobile Only) — fixed: was 'hidden md:hidden', now 'flex md:hidden' -->
    <button id="menu-toggle" class="flex md:hidden fixed top-4 left-4 z-50 p-2 bg-darkSurface rounded-lg text-brandRed hover:bg-darkSurface/80 transition">
        <i class="ph ph-list text-2xl"></i>
    </button>

    <!-- Mobile Overlay (Closes menu when clicked) -->
    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 md:hidden"></div>

    <aside id="sidebar" class="w-64 bg-darkSurface border-r border-gray-800 flex flex-col transition-all duration-300 fixed md:relative h-screen left-0 z-40 md:z-0 -translate-x-full md:translate-x-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <div class="bg-brandRed px-3 py-1 rounded text-white font-bold tracking-wider text-sm shadow-md">
                R.E.N.E.W ADMIN
            </div>
        </div>

        <!-- All nav buttons now have consistent 'nav-btn' class for active state support -->
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="sidebar-nav">
            <button onclick="navigateTo('dashboard')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors active-nav">
                <i class="ph ph-squares-four text-xl"></i>
                <span class="font-medium">Dashboard</span>
            </button>
            
            <button onclick="navigateTo('members')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors">
                <i class="ph ph-users text-xl"></i>
                <span class="font-medium">Members</span>
            </button>
            
            <button onclick="navigateTo('trainers')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors">
                <i class="ph ph-barbell text-xl"></i>
                <span class="font-medium">Trainers</span>
            </button>
            
            <button onclick="navigateTo('finance')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors">
                <i class="ph ph-wallet text-xl"></i>
                <span class="font-medium">Finance</span>
            </button>
            
            <button onclick="navigateTo('crm')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors">
               <i class="ph ph-funnel text-xl"></i>
               <span class="font-medium text-sm">CRM Pipeline</span>
            </button>

            <button onclick="navigateTo('inventory')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors">
               <i class="ph ph-storefront text-xl"></i>
               <span class="font-medium text-sm tracking-wide">Gym Store Inventory</span>
            </button>

            <button onclick="navigateTo('reports')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors">
               <i class="ph ph-chart-polar text-xl"></i>
               <span class="font-medium">Report Generate</span>
            </button>

            <button onclick="navigateTo('fighter-portal')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors">
                <i class="ph ph-user-focus text-xl"></i>
                <span class="font-medium text-sm tracking-wide">Fighter Portal (Demo)</span>
            </button>

            <button onclick="navigateTo('trainer-portal')" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-black/30 hover:text-brandRed transition-colors">
                <i class="ph ph-barbell text-xl"></i>
                <span class="font-medium text-sm tracking-wide">Trainer Portal (Demo)</span>
            </button>
        </nav>

        <div class="p-4 border-t border-gray-800">
            <!-- Resolved merge conflict: keep clearSession onclick -->
            <button onclick="window.clearSession()" class="w-full flex items-center space-x-3 px-4 py-2 rounded-lg text-gray-400 hover:bg-red-500/10 hover:text-red-500 transition-colors">
                <i class="ph ph-sign-out text-xl"></i>
                <span class="font-medium">Logout</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full">
        
        <header class="h-16 bg-darkSurface/80 backdrop-blur-md border-b border-gray-800 flex items-center justify-between px-4 md:px-8 z-10">
            <!-- Added pl-12 md:pl-0 for mobile hamburger clearance -->
            <h2 id="page-title" class="text-lg md:text-xl font-semibold tracking-wide pl-12 md:pl-0">Dashboard</h2>
            
            <div class="flex items-center space-x-3 md:space-x-4">
                <button class="text-gray-400 hover:text-white transition relative">
                    <i class="ph ph-bell text-xl md:text-2xl"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-brandRed rounded-full"></span>
                </button>
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-brandRed to-orange-500 border-2 border-darkSurface cursor-pointer"></div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-darkBg relative" id="main-content">
            </div>
    </main>

    <script src="js/firebaseConfig.js?v=20260623b"></script>
    <script src="js/dbService.js?v=20260623b"></script>
    <script src="js/mockData.js?v=20260623b"></script>
    <script src="js/components/dashboard.js?v=20260623b"></script>
    <script src="js/components/members.js?v=20260623b"></script>
    <script src="js/components/trainers.js?v=20260623b"></script>
    <script src="js/components/finance.js?v=20260623b"></script>
    <script src="js/components/inventory.js?v=20260623b"></script>
    <script src="js/components/crm.js?v=20260623b"></script>
    <script src="js/components/reports.js?v=20260623b"></script>
    <script src="./js/components/member_registration.js?v=20260623b"></script>
    <script src="js/components/fighter_membership.js?v=20260623b"></script> 
    <script src="js/components/fighter_portal.js?v=20260623b"></script>
    <script src="js/components/trainer_auth.js?v=20260623b"></script> 
    <script src="js/components/trainer_portal.js?v=20260623b"></script>
    <!-- Resolved merge conflict: unified_auth.js is required for auth system -->
    <script src="js/components/unified_auth.js?v=20260623b"></script>
    <script src="js/seedFirestore.js?v=20260623b"></script>
    
    <script src="js/app.js?v=20260623b"></script>
</body>
</html>
